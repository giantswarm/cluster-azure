# Cluster name. Defaults to chart release name
clusterName: "marioc3"
# Cluster description used in metadata.
clusterDescription: "marioc3 test cluster"
# Organization in which to create the cluster.
organization: "org-multi-project"
kubernetesVersion: 1.24.8
azure:
  location: "westeurope"
network:
  serviceCIDR: 172.31.0.0/16
  podCIDR: "192.168.0.0/16"
controlPlane:
  instanceType: Standard_D4s_v3
  # Number of replicas in control plane. Should be an odd number.
  replicas: 1
  rootVolumeSizeGB: 50
  etcdVolumeSizeGB: 10
machinePools:
  - name: def00
    location: "westeurope"
    instanceType: Standard_D2s_v3
    minSize: 1
    maxSize: 1
    rootVolumeSizeGB: 50
    customNodeLabels:
      - label=default
    customNodeTaints: []
  - name: def01
    location: "westeurope"
    instanceType: Standard_D4s_v3
    minSize: 1
    maxSize: 1
    rootVolumeSizeGB: 50
    customNodeLabels:
      - label=default
    customNodeTaints: []
sshSSOPublicKey: "ssh-rsa "
oidc:
  issuerUrl: ""
  caPem: ""
  clientId: ""
  usernameClaim: ""
  groupsClaim: ""
